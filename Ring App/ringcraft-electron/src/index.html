<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ring Crafting Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root{--gold:#C9974A;--gold-light:#E8C87A;--gold-dark:#8B6520;--onyx:#0E0E10;--onyx-mid:#1A1A1E;--onyx-light:#252529;--onyx-border:#2E2E34;--tx:#EDE8DF;--txm:#7A7A8A;--ruby:#C94A5A;--grn:#6AC94A;--r:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;overflow-x:hidden;}
body{background:var(--onyx);color:var(--tx);font-family:'Crimson Pro',Georgia,serif;font-size:15px;background-image:radial-gradient(ellipse at 20% 0%,rgba(201,151,74,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(74,122,201,.04) 0%,transparent 60%);}
.app{display:flex;flex-direction:column;min-height:100vh;}
.hdr{border-bottom:1px solid var(--onyx-border);padding:15px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(201,151,74,.04);position:sticky;top:0;z-index:50;}
.hdr h1{font-family:'Cinzel',serif;font-size:17px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-light);}
.hdr p{font-size:12px;color:var(--txm);font-style:italic;margin-top:2px;}
.nav{display:flex;border-bottom:1px solid var(--onyx-border);padding:0 24px;background:rgba(0,0,0,.15);position:sticky;top:61px;z-index:40;}
.ntab{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;padding:10px 16px;border:none;background:transparent;cursor:pointer;color:var(--txm);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.ntab:hover{color:var(--tx);}
.ntab.on{color:var(--gold-light);border-bottom-color:var(--gold);}
.main{max-width:1040px;margin:0 auto;padding:22px 24px 80px;width:100%;}
.btn{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-radius:var(--r);border:1px solid;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px;}
.btn-gold{background:linear-gradient(135deg,var(--gold-dark),var(--gold));border-color:var(--gold-light);color:var(--onyx);}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-ghost{background:transparent;border-color:var(--onyx-border);color:var(--txm);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{background:transparent;border-color:rgba(201,74,90,.3);color:var(--ruby);}
.btn-danger:hover{background:rgba(201,74,90,.1);}
.btn-sm{font-size:9px;padding:4px 9px;}
.ib{width:24px;height:24px;border-radius:4px;border:1px solid transparent;background:transparent;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;justify-content:center;transition:all .13s;color:var(--txm);}
.ib:hover{border-color:var(--onyx-border);background:rgba(255,255,255,.05);color:var(--tx);}
.ib.d:hover{border-color:rgba(201,74,90,.4);color:var(--ruby);background:rgba(201,74,90,.08);}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:9px;margin-bottom:24px;}
.mc{background:var(--onyx-mid);border:1px solid var(--onyx-border);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--gold-dark),var(--gold));}
.mc-lbl{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--txm);margin-bottom:4px;}
.mc-val{font-size:19px;font-weight:300;color:var(--gold-light);}
.mc-sub{font-size:11px;color:var(--txm);margin-top:2px;font-style:italic;}
.sh{display:flex;align-items:center;gap:10px;margin:20px 0 8px;}
.sh h2{font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);white-space:nowrap;}
.sh-line{flex:1;height:1px;background:linear-gradient(to right,var(--onyx-border),transparent);}
.card{background:var(--onyx-mid);border:1px solid var(--onyx-border);border-radius:var(--r);margin-bottom:5px;overflow:hidden;transition:border-color .15s;}
.card:hover{border-color:rgba(201,151,74,.2);}
.card-h{padding:11px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.card-h:hover{background:rgba(255,255,255,.02);}
.card-b{padding:0 14px 14px;border-top:1px solid var(--onyx-border);}
.chev{font-size:8px;color:var(--txm);transition:transform .2s;flex-shrink:0;}
.chev.open{transform:rotate(90deg);}
.ct{font-size:14px;font-weight:500;flex:1;}
.cs{font-size:11px;color:var(--txm);font-style:italic;margin-top:1px;}
.gdot{width:7px;height:7px;border-radius:2px;flex-shrink:0;transform:rotate(45deg);}
.pill{font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:.06em;padding:2px 8px;border-radius:100px;}
.p-gold{background:rgba(201,151,74,.15);color:var(--gold-light);border:1px solid rgba(201,151,74,.3);}
.p-blue{background:rgba(74,122,201,.15);color:#7AABF0;border:1px solid rgba(74,122,201,.3);}
.p-cnt{background:rgba(255,255,255,.05);color:var(--txm);border:1px solid var(--onyx-border);font-size:8px;}
.p-grn{background:rgba(106,201,74,.12);color:#8AE064;border:1px solid rgba(106,201,74,.2);font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:.06em;padding:2px 8px;border-radius:100px;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;}
.tbl th{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--txm);text-align:left;padding:5px 8px;border-bottom:1px solid var(--onyx-border);}
.tbl th.r{text-align:right;}
.tbl td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl td.r{text-align:right;font-variant-numeric:tabular-nums;font-size:12px;}
.ttr td{background:rgba(255,255,255,.03);font-weight:500;}
.tgr td{background:rgba(201,151,74,.08);color:var(--gold-light);font-weight:600;}
.bdg{display:inline-block;font-size:8px;padding:1px 5px;border-radius:100px;margin-left:4px;font-family:'Cinzel',serif;letter-spacing:.05em;text-transform:uppercase;}
.bdg-p{background:rgba(106,201,74,.12);color:#8AE064;border:1px solid rgba(106,201,74,.25);}
.bdg-s{background:rgba(201,74,201,.12);color:#E07AE0;border:1px solid rgba(201,74,201,.25);}
.fp{background:var(--onyx-light);border:1px solid var(--onyx-border);border-radius:var(--r);padding:12px 14px;margin-top:8px;}
.fp-t{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.fr{display:flex;gap:6px;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fg label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.11em;text-transform:uppercase;color:var(--txm);}
.fg input,.fg select{background:var(--onyx-mid);color:var(--tx);border:1px solid var(--onyx-border);border-radius:var(--r);padding:5px 7px;font-size:13px;font-family:'Crimson Pro',serif;min-width:0;transition:border-color .13s;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--gold);}
.fg select option{background:var(--onyx-light);}
.fa{display:flex;gap:6px;margin-top:8px;}
.tabs2{display:flex;border:1px solid var(--onyx-border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;width:fit-content;}
.t2{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.09em;text-transform:uppercase;padding:5px 10px;border:none;background:transparent;cursor:pointer;color:var(--txm);transition:all .13s;}
.t2:hover{color:var(--tx);background:rgba(255,255,255,.04);}
.t2.on{background:var(--onyx-border);color:var(--gold-light);}
.ie{background:var(--onyx-light);padding:8px;border-radius:var(--r);}
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:6px;}
.cmp-c{background:var(--onyx-light);border:1px solid var(--onyx-border);border-radius:var(--r);padding:8px 10px;text-align:center;}
.cmp-gem{width:7px;height:7px;border-radius:2px;transform:rotate(45deg);margin:0 auto 5px;display:block;}
.cmp-n{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--txm);margin-bottom:2px;}
.cmp-v{font-size:14px;font-weight:300;color:var(--gold-light);}
.cmp-i{font-size:10px;color:var(--txm);font-style:italic;margin-top:2px;}
.rsumm{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.rsc{background:var(--onyx-mid);border:1px solid var(--onyx-border);border-radius:var(--r);padding:10px 12px;text-align:center;}
.rsc-v{font-size:18px;font-weight:300;color:var(--gold-light);}
.rsc-l{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--txm);margin-top:2px;}
.rsh{display:flex;align-items:center;gap:8px;margin:13px 0 7px;}
.rsh h3{font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;white-space:nowrap;}
.rsh-line{flex:1;height:1px;background:linear-gradient(to right,var(--onyx-border),transparent);}
.rsh-cnt{font-family:'Cinzel',serif;font-size:8px;background:var(--onyx-border);padding:1px 6px;border-radius:100px;color:var(--txm);}
.rl-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:4px;border-left:2px solid;margin-bottom:2px;}
.rl-ring{border-left-color:rgba(106,201,74,.5);background:rgba(106,201,74,.03);}
.rl-si{border-left-color:rgba(201,74,201,.5);background:rgba(201,74,201,.03);}
.rl-raw{border-left-color:rgba(201,151,74,.3);}
.rl-name{flex:1;font-size:14px;}
.rl-type{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;border-radius:100px;}
.lt-ring{background:rgba(106,201,74,.1);color:#8AE064;border:1px solid rgba(106,201,74,.2);}
.lt-si{background:rgba(201,74,201,.1);color:#E07AE0;border:1px solid rgba(201,74,201,.2);}
.lt-raw{background:rgba(201,151,74,.08);color:var(--gold);border:1px solid rgba(201,151,74,.18);}
.rl-qty{font-family:'Cinzel',serif;font-size:12px;font-weight:600;white-space:nowrap;min-width:75px;text-align:right;font-variant-numeric:tabular-nums;}
.rl-cost{font-size:12px;color:var(--txm);white-space:nowrap;min-width:75px;text-align:right;font-variant-numeric:tabular-nums;}
.rl-tot{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:4px;margin-top:9px;background:rgba(201,151,74,.08);border:1px solid rgba(201,151,74,.2);}
.oc{background:var(--onyx-mid);border:1px solid var(--onyx-border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;}
.oc-hdr{padding:11px 14px;display:flex;align-items:center;gap:9px;background:rgba(201,151,74,.04);border-bottom:1px solid var(--onyx-border);}
.oc-num{font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--gold-dark);background:rgba(201,151,74,.15);border:1px solid rgba(201,151,74,.25);padding:2px 8px;border-radius:100px;flex-shrink:0;}
.oc-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--gold-light);flex:1;}
.oc-cpill{font-family:'Cinzel',serif;font-size:11px;font-weight:600;background:rgba(201,151,74,.12);border:1px solid rgba(201,151,74,.3);color:var(--gold-light);padding:3px 10px;border-radius:100px;white-space:nowrap;}
.oc-body{padding:12px 14px;}
.rt{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-radius:4px;cursor:pointer;border:1px solid var(--onyx-border);background:rgba(255,255,255,.02);margin-bottom:9px;user-select:none;}
.rt:hover{background:rgba(255,255,255,.04);}
.rt-lbl{font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--txm);}
.rt-chev{font-size:8px;color:var(--txm);}
.rdrop{border:1px solid var(--onyx-border);border-radius:4px;overflow:hidden;margin-bottom:10px;}
.mr{display:flex;align-items:center;gap:8px;padding:6px 9px;border-bottom:1px solid rgba(255,255,255,.03);}
.mr:last-child{border-bottom:none;}
.mr:hover{background:rgba(255,255,255,.02);}
.mck{width:14px;height:14px;accent-color:var(--grn);cursor:pointer;flex-shrink:0;}
.mn{flex:1;font-size:12px;}
.mn.strk{text-decoration:line-through;opacity:.4;}
.mtype{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.07em;text-transform:uppercase;padding:1px 5px;border-radius:100px;}
.mqty{font-size:11px;color:var(--txm);white-space:nowrap;min-width:75px;text-align:right;font-variant-numeric:tabular-nums;}
.mcost{font-size:11px;color:var(--txm);white-space:nowrap;min-width:70px;text-align:right;font-variant-numeric:tabular-nums;}
.sup-row{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:4px;margin-bottom:2px;background:rgba(106,201,74,.05);border:1px solid rgba(106,201,74,.13);}
.sn{flex:1;font-size:12px;}
.sq{font-size:11px;color:#8AE064;white-space:nowrap;min-width:75px;text-align:right;font-variant-numeric:tabular-nums;}
.ss{font-size:11px;color:#8AE064;white-space:nowrap;min-width:70px;text-align:right;font-variant-numeric:tabular-nums;}
.add-sup{display:flex;gap:5px;flex-wrap:wrap;align-items:flex-end;padding:9px 11px;border:1px dashed var(--onyx-border);border-radius:4px;margin-top:8px;}
.sp-block{background:var(--onyx-mid);border:1px solid var(--onyx-border);border-radius:var(--r);overflow:hidden;margin-top:12px;}
.sp-hdr{padding:11px 16px;border-bottom:1px solid var(--onyx-border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sp-title{font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;}
.sp-body{padding:12px 16px;}
.oq-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.oq-row:last-child{border-bottom:none;}
.oq-lbl{font-size:13px;color:var(--txm);}
.oq-val{font-size:13px;font-variant-numeric:tabular-nums;}
.oq-green{color:#8AE064;}
.oq-tot{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:4px;margin-top:6px;}
.oq-tot-lbl{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-light);}
.oq-tot-val{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:var(--gold-light);}
.empty-note{font-size:12px;color:var(--txm);font-style:italic;padding:4px 0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:36px 20px;overflow-y:auto;}
.modal{background:var(--onyx-mid);border:1px solid var(--gold-dark);border-radius:8px;width:100%;max-width:720px;max-height:85vh;overflow-y:auto;}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--onyx-border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--onyx-mid);z-index:10;}
.modal-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-light);}
.modal-body{padding:16px 20px;}
hr.fd{border:none;border-top:1px solid var(--onyx-border);margin:8px 0;}
.g-s{background:#4A7AC9;}.g-r{background:#C94A5A;}.g-e{background:#4AC97A;}
.g-a{background:#4AC9C9;}.g-c{background:#C9B84A;}.g-o{background:#8A8A9A;}
.g-g{background:#C9974A;}.g-sv{background:#A8A8B8;}.g-x{background:#7A7A8A;}
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
